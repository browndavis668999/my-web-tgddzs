<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单统计助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        .content {
            padding: 30px;
        }
        .input-section {
            margin-bottom: 20px;
        }
        .input-section label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }
        textarea {
            width: 100%;
            height: 200px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            font-family: "Consolas", "Monaco", monospace;
            resize: vertical;
            transition: border-color 0.3s;
        }
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        button {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary {
            background: #f5f5f5;
            color: #333;
        }
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        .output-section {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            min-height: 100px;
        }
        .output-section h3 {
            margin-bottom: 15px;
            color: #333;
            font-size: 16px;
        }
        #output {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 15px;
            line-height: 1.8;
            white-space: pre-wrap;
            color: #333;
        }
        .dankou {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px dashed #ddd;
        }
        .dankou:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }
        .dankou-name {
            font-weight: bold;
            font-size: 18px;
            color: #667eea;
            margin-bottom: 10px;
        }
        .item-line {
            margin-left: 0;
            margin-bottom: 5px;
        }
        .summary {
            margin-top: 20px;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 8px;
            font-weight: bold;
            text-align: center;
        }
        .btn-copy {
            float: right;
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 10px;
        }
        .btn-copy:hover {
            background: #5a6fd6;
        }
        .btn-copy.success {
            background: #28a745;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>订单统计助手</h1>
            <p>支持档口：4m、6m、创辉、阳阳、灿灿、琛光、红运、品宣、ch、苹果</p>
        </div>
        <div class="content">
            <div class="input-section">
                <label>请粘贴订单数据（支持Tab分隔或空格分隔）：</label>
                <textarea id="inputData" placeholder="商家编码	商家编码（属性）	规格	成本价	数量
红运9593		深蓝色...	0	1"></textarea>
            </div>
            <div class="btn-group">
                <button class="btn-primary" onclick="processData()">统计订单</button>
                <button class="btn-secondary" onclick="clearAll()">清空</button>
            </div>
            <div class="output-section">
                <h3>统计结果：</h3>
                <button class="btn-copy" id="copyBtn" onclick="copyResult()">一键复制</button>
                <div id="output"></div>
            </div>
        </div>
    </div>
    
    <script>
        // 档口前缀映射
        const dankouPrefixes = [
            '4m', '6m', '创辉', '阳阳', '灿灿', '琛光', '红运', '品宣', 'ch', '苹果'
        ];

        // 提取档口名称
        function extractDankou(code) {
            code = code.trim();
            for (let prefix of dankouPrefixes) {
                if (code.toLowerCase().startsWith(prefix.toLowerCase())) {
                    return prefix;
                }
            }
            return '其他';
        }

        // 提取货号（去掉档口前缀）
        function extractHuohao(code, dankou) {
            if (dankou === '其他') {
                return code.trim();
            }
            return code.substring(dankou.length).trim();
        }

        // 提取颜色（从规格字段）
        function extractColor(spec) {
            if (!spec) return '默认';
            // 规格格式: "颜色，尺码" 或 "颜色 尺码"
            let color = spec.split(/[，,]/)[0];
            // 去除常见描述词和方括号内容
            color = color.replace(/小个子款|常规款|加长款|加绒款|不加绒|长裤款|九分裤|单款|裤长\d+厘米|适合\d+厘米/g, '');
            color = color.replace(/【.*?】|\[.*?\]/g, '');
            color = color.replace(/\s+/g, ' ').trim();
            return color || '默认';
        }

        // 提取尺码（从规格字段）
        function extractSize(spec) {
            if (!spec) return '均码';

            // 尝试匹配逗号后的尺码
            let parts = spec.split(/[，,]/);
            if (parts.length > 1) {
                let sizePart = parts[1];
                // 先匹配带字母的尺码（如 5XL、4XL、3XL、2XL、XL、L、M、S、XS）
                let match = sizePart.match(/(5XL|4XL|3XL|2XL|XXL|XL|XS|S|M|L)/i);
                if (match) {
                    return match[1].toUpperCase().replace('XXL', '2XL');
                }
                // 再匹配纯数字尺码（如 26、27、28...36、38 等）
                let numMatch = sizePart.match(/(\d+)/);
                if (numMatch) {
                    return numMatch[1];
                }
            }

            // 如果没有逗号，尝试从整个规格中提取
            let match = spec.match(/[，,]\s*(5XL|4XL|3XL|2XL|XXL|XL|XS|S|M|L)/i);
            if (match) {
                return match[1].toUpperCase().replace('XXL', '2XL');
            }

            // 尝试从方括号中提取数字尺码，如 [27[适合94至103斤]]
            let bracketNumMatch = spec.match(/\[(\d{2,3})/);
            if (bracketNumMatch) {
                return bracketNumMatch[1];
            }

            // 尝试匹配逗号后的数字
            let numMatch = spec.match(/[，,]\s*(\d+)/);
            if (numMatch) {
                return numMatch[1];
            }

            return '均码';
        }

        // 解析单行数据
        function parseLine(line) {
            line = line.trim();
            if (!line) return null;

            // 跳过表头
            if (line.includes('商家编码') && line.includes('规格')) {
                return null;
            }

            // 尝试Tab分隔
            let parts = line.split('\t');

            // 如果Tab分隔后字段太少，尝试用正则解析
            if (parts.length < 4) {
                // 格式：商家编码 规格 成本价 数量
                // 商家编码可能是多个单词，数量在最后，成本价在倒数第二
                // 尝试匹配：最后一列是数量，倒数第二是成本价(0)，中间是规格

                // 匹配模式：(商家编码) (规格描述) 0 (数量)
                let match = line.match(/^(.+?)\s+(.+?)\s+0\s+(\d+)\s*$/);
                if (match) {
                    return {
                        code: match[1].trim(),
                        spec: match[2].trim(),
                        quantity: parseInt(match[3]) || 1
                    };
                }

                // 更宽松的匹配：找最后的数字作为数量
                let parts2 = line.split(/\s+/);
                if (parts2.length >= 3) {
                    let lastNum = parseInt(parts2[parts2.length - 1]);
                    if (!isNaN(lastNum)) {
                        // 倒数第二个应该是成本价，跳过
                        let code = parts2[0];
                        let spec = parts2.slice(1, -2).join(' ');
                        return {
                            code: code,
                            spec: spec,
                            quantity: lastNum
                        };
                    }
                }
                return null;
            }

            // Tab分隔格式
            let code = parts[0] ? parts[0].trim() : '';
            let spec = parts[2] ? parts[2].trim() : '';
            let quantity = parseInt(parts[parts.length - 1]) || 1;

            if (!code) return null;

            return { code, spec, quantity };
        }

        // 处理数据
        function processData() {
            const input = document.getElementById('inputData').value.trim();
            if (!input) {
                alert('请输入订单数据！');
                return;
            }

            const lines = input.split('\n');
            const orders = [];

            // 解析每一行
            for (let line of lines) {
                let parsed = parseLine(line);
                if (!parsed) continue;

                let dankou = extractDankou(parsed.code);
                let huohao = extractHuohao(parsed.code, dankou);
                let color = extractColor(parsed.spec);
                let size = extractSize(parsed.spec);

                orders.push({
                    dankou,
                    huohao,
                    color,
                    size,
                    quantity: parsed.quantity
                });
            }

            if (orders.length === 0) {
                alert('未能解析到有效数据，请检查格式！');
                return;
            }

            // 按档口+货号+颜色分组
            const groups = {};
            for (let order of orders) {
                let key = `${order.dankou}|${order.huohao}|${order.color}`;
                if (!groups[key]) {
                    groups[key] = {
                        dankou: order.dankou,
                        huohao: order.huohao,
                        color: order.color,
                        sizes: {}
                    };
                }
                if (groups[key].sizes[order.size]) {
                    groups[key].sizes[order.size] += order.quantity;
                } else {
                    groups[key].sizes[order.size] = order.quantity;
                }
            }

            // 按档口排序输出
            const dankouOrder = ['4m', '6m', '创辉', '阳阳', '灿灿', '琛光', '红运', '品宣', 'ch', '苹果', '其他'];
            let output = '';
            let dankouCount = 0;
            let itemCount = 0;

            // 按档口分组
            const dankouGroups = {};
            for (let key in groups) {
                let d = groups[key].dankou;
                if (!dankouGroups[d]) {
                    dankouGroups[d] = [];
                }
                dankouGroups[d].push(groups[key]);
            }

            // 排序输出
            for (let dankou of dankouOrder) {
                if (!dankouGroups[dankou]) continue;

                dankouCount++;
                output += `<div class="dankou">`;
                output += `<div class="dankou-name">${dankou}</div>`;

                // 同一档口内按货号排序
                dankouGroups[dankou].sort((a, b) => a.huohao.localeCompare(b.huohao, 'zh-CN'));

                for (let item of dankouGroups[dankou]) {
                    let sizeStr = Object.entries(item.sizes)
                        .map(([size, qty]) => `${size} × ${qty}`)
                        .join('，');
                    output += `<div class="item-line">${item.huohao} ${item.color} ${sizeStr}；</div>`;
                    itemCount++;
                }
                output += `</div>`;
            }

            output += `<div class="summary">共 ${dankouCount} 个档口，${itemCount} 条明细记录。</div>`;

            document.getElementById('output').innerHTML = output;
        }

        // 清空
        function clearAll() {
            document.getElementById('inputData').value = '';
            document.getElementById('output').innerHTML = '';
        }

        // 复制结果
        function copyResult() {
            const output = document.getElementById('output');
            const text = output.innerText || output.textContent;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.getElementById('copyBtn');
                btn.textContent = '已复制 ✓';
                btn.classList.add('success');
                setTimeout(() => {
                    btn.textContent = '一键复制';
                    btn.classList.remove('success');
                }, 2000);
            }).catch(() => {
                // 备用方案：使用老式复制方法
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                const btn = document.getElementById('copyBtn');
                btn.textContent = '已复制 ✓';
                btn.classList.add('success');
                setTimeout(() => {
                    btn.textContent = '一键复制';
                    btn.classList.remove('success');
                }, 2000);
            });
        }

        // 支持粘贴后自动处理
        document.getElementById('inputData').addEventListener('paste', function(e) {
            setTimeout(() => {
                if (this.value.trim()) {
                    processData();
                }
            }, 100);
        });
    </script>
</body>
</html>
